name: Release to Hex

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: read

jobs:
  publish:
    name: Publish ${{ github.ref_name }}
    runs-on: ubuntu-latest
    env:
      HEX_API_KEY: ${{ secrets.HEX_API_KEY }}

    steps:
      - uses: actions/checkout@v4

      - uses: erlef/setup-beam@v1
        with:
          otp-version: '27'
          elixir-version: '1.19'

      - name: Cache deps & build
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: ${{ runner.os }}-mix-${{ hashFiles('**/mix.lock') }}
          restore-keys: ${{ runner.os }}-mix-

      - name: Install dependencies
        run: mix deps.get

      - name: Verify formatting
        run: mix format --check-formatted

      - name: Compile (warnings as errors)
        run: mix compile --warnings-as-errors

      - name: Run tests
        run: mix test

      - name: Verify tag matches mix.exs version
        env:
          TAG: ${{ github.ref_name }}
        run: |
          TAG_VERSION="${TAG#v}"
          MIX_VERSION=$(mix run --no-start -e 'IO.puts Mix.Project.config()[:version]')
          if [ "$TAG_VERSION" != "$MIX_VERSION" ]; then
            echo "::error::Git tag ($TAG_VERSION) does not match mix.exs @version ($MIX_VERSION)"
            exit 1
          fi

      - name: Publish to Hex
        run: mix hex.publish --yes
